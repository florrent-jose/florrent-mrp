<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>florrent MRP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#f0f4f8;color:#1e293b}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:205px;background:#1B2A4A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sidebar-sub{font-size:9px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.8px}
.sidebar-nav{flex:1;padding:6px 0}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 14px;background:transparent;border:none;border-left:3px solid transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:12.5px;text-align:left;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(255,255,255,.13);color:#fff;border-left-color:#2563EB}
.sidebar-user{padding:10px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user-name{font-size:12.5px;color:#fff;font-weight:500}
.sidebar-user-label{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:2px}
.signout-btn{margin-top:5px;font-size:11px;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
.main{flex:1;overflow-y:auto;padding:22px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.page-title{font-size:18px;font-weight:600;color:#1B2A4A}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#1B2A4A;margin-bottom:9px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit;line-height:1.4}
.btn-pri{background:#2563EB;color:#fff;border-color:#2563EB}
.btn-pri:hover{background:#1d4ed8}
.btn-out{background:#fff;color:#1B2A4A;border-color:#cbd5e1}
.btn-out:hover{background:#f8fafc}
.btn-dan{background:#fff;color:#dc2626;border-color:#fca5a5}
.btn-gh{background:transparent;color:#64748b;border:none;padding:3px 7px}
.btn-gh:hover{color:#1B2A4A}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block}
.badge-bl{background:#dbeafe;color:#1d4ed8}
.badge-gr{background:#f1f5f9;color:#475569}
.badge-gn{background:#dcfce7;color:#166534}
.badge-am{background:#fef3c7;color:#92400e}
.badge-rd{background:#fee2e2;color:#991b1b}
.badge-pu{background:#ede9fe;color:#5b21b6}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;font-weight:600;color:#475569;font-size:11px;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f9fafb;vertical-align:middle}
tr:hover td{background:#f8fafc}
.form-label{font-size:11px;color:#64748b;font-weight:500;display:block;margin-bottom:3px}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:6px 9px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;color:#1e293b;outline:none}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:#2563EB}
textarea{resize:vertical}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 16px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:660px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{width:820px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid #e2e8f0}
.modal-title{font-size:14px;font-weight:600;color:#1B2A4A}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#94a3b8;line-height:1;font-family:inherit}
.modal-body{padding:18px}
.section-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #f1f5f9}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#f8fafc;border-radius:8px;padding:11px 14px;flex:1;min-width:120px}
.stat-lbl{font-size:11px;color:#64748b;font-weight:500;margin-bottom:2px}
.stat-val{font-size:21px;font-weight:600}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:12px}
.mono{font-family:monospace;font-weight:500;color:#2563EB}
.upload-zone{border:1.5px dashed #cbd5e1;border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;background:#fafbfc;margin-bottom:6px}
.upload-zone:hover{border-color:#2563EB;background:#eff6ff}
.file-item{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:4px 8px;background:#f1f5f9;border-radius:5px;margin-bottom:3px}
.action-cell{display:flex;gap:3px;flex-wrap:wrap}
.empty-row td{text-align:center;color:#94a3b8;padding:20px!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A}
.login-box{background:#fff;border-radius:16px;padding:34px;width:310px}
.login-logo{font-size:26px;font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:4px}
.login-sub{font-size:10px;color:#94a3b8;letter-spacing:1.2px;margin-bottom:20px}
.login-h{font-size:17px;font-weight:600;color:#1B2A4A;margin-bottom:4px}
.login-p{font-size:12px;color:#64748b;margin-bottom:16px}
.doc-view-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #1B2A4A}
.doc-logo{font-size:22px;font-weight:700;color:#1B2A4A;letter-spacing:-0.5px;line-height:1}
.doc-tagline{font-size:8.5px;color:#94a3b8;letter-spacing:1px;margin-top:2px}
.doc-addr{text-align:right;font-size:11px;color:#64748b}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px}
.meta-cell{background:#f8fafc;padding:5px 8px;border-radius:5px}
.meta-cell-lbl{font-size:8.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.meta-cell-val{font-weight:500;font-size:12px}
.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.party-cell{background:#f8fafc;padding:9px 10px;border-radius:6px}
.doc-table th{background:#1B2A4A;color:#fff}
.sig-row{margin-top:14px;padding:11px;border:1px solid #e2e8f0;border-radius:6px;display:flex;justify-content:space-between}
.sig-line{margin-top:20px;border-top:1px solid #94a3b8;width:170px;padding-top:3px;font-size:9px;color:#94a3b8}
.contacts-panel{margin-top:13px;padding-top:9px;border-top:1px solid #e2e8f0}
.contacts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.contacts-lbl{font-size:12px;font-weight:600;color:#1B2A4A}
.add-contact-form{margin-top:8px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.line-items-table{width:100%;border-collapse:collapse;margin-bottom:7px}
.line-items-total{text-align:right;font-weight:700;color:#1B2A4A;padding:6px 10px}
input[type=checkbox]{width:auto;margin-right:4px}
.detail-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.detail-cell{background:#f8fafc;padding:6px 9px;border-radius:5px}
.detail-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.detail-val{font-weight:500;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Constants ──
const B="#1B2A4A",A="#2563EB";
const PRODS=[
  {id:"p1",sku:"floMOD16V500",name:"floMOD 16V 500F",lp:5000},
  {id:"p2",sku:"floMOD32V250",name:"floMOD 32V 250F",lp:10000},
  {id:"p3",sku:"floMOD48V166",name:"floMOD 48V 166F",lp:15000},
  {id:"p4",sku:"floMOD64V125",name:"floMOD 64V 125F",lp:20000},
  {id:"p5",sku:"floMOD80V100",name:"floMOD 80V 100F",lp:25000},
  {id:"p6",sku:"floMOD96V83", name:"floMOD 96V 83F", lp:30000},
];
const USERS=[{id:"u1",name:"Jose"},{id:"u2",name:"Joe"},{id:"u3",name:"Kaitlin"}];
const NAV=[
  {id:"dash",ico:"📊",lbl:"Dashboard"},
  {id:"prods",ico:"📦",lbl:"Products"},
  {id:"inv",ico:"🏭",lbl:"Inventory & Warehouses"},
  {id:"vend",ico:"🚚",lbl:"Vendors"},
  {id:"cust",ico:"👥",lbl:"Customers"},
  {id:"quot",ico:"📋",lbl:"Quotes"},
  {id:"oa",ico:"✅",lbl:"Order Acks"},
  {id:"inv2",ico:"🧾",lbl:"Invoices"},
  {id:"po",ico:"🛒",lbl:"Purchase Orders"},
  {id:"wo",ico:"🔧",lbl:"Work Orders"},
  {id:"loc",ico:"🏢",lbl:"Locations"},
  {id:"aud",ico:"📜",lbl:"Audit Log"},
];

// ── Helpers ──
function uid(){return Math.random().toString(36).slice(2,9);}
function tod(){return new Date().toISOString().slice(0,10);}
function f$(n){return "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0});}
const USER_CODES={"Jose":"012","Joe":"044","Kaitlin":"413","Alex":"023","Ryan":"010","Adam":"203"};
const CLASS_CODES=["DEV","EQU","MAT","SUP","SER","NRE","CON"];
function gn(docType,list,userName,classCode){
  var bbb=USER_CODES[userName]||"000";
  var aaa=classCode||"DEV";
  var d=tod();
  var seq=String(list.length+1).padStart(2,"0")+"A";
  return aaa+"-"+bbb+"-"+d+"-"+docType+seq;
}
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class"){e.className=v;}
    else if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="html"){e.innerHTML=v;}
    else if(k==="disabled"){if(v)e.disabled=true;}
    else{e.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}
function txt(s){return document.createTextNode(String(s));}
function frag(...children){const f=document.createDocumentFragment();children.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)f.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});return f;}

// ── State ──
let state={
  user:null,page:"dash",
  db:{
    products:[...PRODS],
    vendors:[],customers:[],
    warehouses:[{id:"wh1",name:"Northampton Main",loc:"155 Industrial Drive, Northampton MA 01060"}],
    inventory:{},quotes:[],orderAcks:[],invoices:[],
    purchaseOrders:[],workOrders:[],packagingSlips:[],
    locations:[{id:"loc1",name:"Northampton HQ",address:"155 Industrial Drive, Ste. 2",city:"Northampton",state:"MA",zip:"01060",country:"USA",isDefault:true}],
    auditLog:[],
  }
};

function log(action,detail){
  state.db.auditLog.unshift({id:uid(),ts:new Date().toISOString(),user:state.user?.name||"System",action,detail});
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  if(!state.user){root.appendChild(renderLogin());return;}
  root.appendChild(renderApp());
}

// ── Primitives ──
function btn(label,cls,onClick,disabled){
  const b=el("button",{"class":"btn "+cls,onClick},label);
  if(disabled) b.disabled=true;
  return b;
}
function badge(text,color){return el("span",{"class":"badge badge-"+color},text);}
function modal(title,w,contentFn,onClose){
  const ov=el("div",{"class":"overlay"});
  const m=el("div",{"class":"modal"+(w==="lg"?" modal-lg":"")});
  const hdr=el("div",{"class":"modal-header"},
    el("span",{"class":"modal-title"},title),
    el("button",{"class":"modal-close",onClick:()=>ov.remove()},"×")
  );
  const body=el("div",{"class":"modal-body"});
  body.appendChild(contentFn(()=>ov.remove()));
  m.append(hdr,body);
  ov.appendChild(m);
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  return ov;
}
function formLabel(text){return el("label",{"class":"form-label"},text);}
function inp(type,value,onChange,placeholder){
  const i=el("input",{type,value:value||"",placeholder:placeholder||""});
  i.addEventListener("input",e=>onChange(e.target.value));
  return i;
}
function sel(opts,value,onChange){
  const s=el("select",{});
  opts.forEach(o=>{const op=el("option",{value:o.v},o.l);if(o.v===value)op.selected=true;s.appendChild(op);});
  s.addEventListener("change",e=>onChange(e.target.value));
  return s;
}
function ta(value,onChange,rows){
  const t=el("textarea",{rows:rows||2},value||"");
  t.addEventListener("input",e=>onChange(e.target.value));
  return t;
}
function fg(label,control){const d=el("div",{});d.appendChild(formLabel(label));d.appendChild(control);return d;}
function secLbl(text){return el("div",{"class":"section-lbl"},text);}
function detailCell(k,v){return el("div",{"class":"detail-cell"},el("div",{"class":"detail-lbl"},k),el("div",{"class":"detail-val"},v||"—"));}

// ── File Upload ──
function fileUpload(files,onAdd,accept,onDelete){
  const wrap=el("div",{});
  const zone=el("div",{"class":"upload-zone"});
  const inp_=document.createElement("input");
  inp_.type="file";inp_.accept=accept||"*";inp_.style.display="none";
  inp_.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{onAdd({id:uid(),name:f.name,size:f.size,data:ev.target.result,at:tod()});inp_.value="";renderFileList();};
    r.readAsDataURL(f);
  });
  zone.append(el("span",{},"📎"),el("span",{"style":{fontSize:"12px",color:"#64748b"}},"Click to attach file"),inp_);
  zone.addEventListener("click",()=>inp_.click());
  wrap.appendChild(zone);
  const list=el("div",{});
  function renderFileList(){
    list.innerHTML="";
    files.forEach((f,idx)=>{
      const row=document.createElement("div");
      row.style.cssText="display:flex;align-items:center;gap:7px;font-size:11.5px;padding:4px 8px;background:#f1f5f9;border-radius:5px;margin-bottom:3px";
      const icon=el("span",{},"📄");
      const name=el("span",{"style":{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},f.name);
      const meta=el("span",{"style":{color:"#94a3b8",fontSize:"10px",whiteSpace:"nowrap"}},(f.size/1024).toFixed(0)+"KB · "+f.at);
      row.append(icon,name,meta);
      if(f.data){
        const a=el("a",{href:f.data,download:f.name,"style":{color:A,fontSize:"11px",textDecoration:"none",fontWeight:600,whiteSpace:"nowrap"}},"↓");
        row.appendChild(a);
      }
      const delBtn=document.createElement("button");
      delBtn.textContent="🗑";delBtn.title="Delete attachment";
      delBtn.style.cssText="background:none;border:none;cursor:pointer;color:#dc2626;font-size:13px;padding:0;line-height:1;flex-shrink:0";
      delBtn.addEventListener("click",()=>{
        confirmModal("Remove attachment \""+f.name+"\"?",()=>{
          files.splice(idx,1);
          if(onDelete)onDelete(files);
          renderFileList();
        });
      });
      row.appendChild(delBtn);
      list.appendChild(row);
    });
  }
  renderFileList();
  wrap.appendChild(list);
  return wrap;
}

// ── Confirm Modal ──
function confirmModal(msg,onConfirm){
  const ov=modal("Confirm","",close=>{
    const div=el("div",{});
    div.appendChild(el("div",{"style":{fontSize:"13px",color:"#1e293b",marginBottom:"18px"}},msg));
    const btns=el("div",{"style":{display:"flex",justifyContent:"flex-end",gap:"8px"}});
    btns.append(btn("Cancel","btn btn-out",close),btn("Delete","btn btn-dan",()=>{close();onConfirm();}));
    div.appendChild(btns);return div;
  });
  document.body.appendChild(ov);
}

// ── Table ──
function table(cols,rows,renderRow){
  const t=el("table",{});
  const thead=el("thead",{});const hrow=el("tr",{});
  cols.forEach(c=>hrow.appendChild(el("th",{},c)));
  thead.appendChild(hrow);t.appendChild(thead);
  const tbody=el("tbody",{});
  if(rows.length===0){
    const tr=el("tr",{"class":"empty-row"});
    tr.appendChild(el("td",{colspan:cols.length},"No records yet"));
    tbody.appendChild(tr);
  } else {
    rows.forEach(r=>{
      const tr=el("tr",{});
      renderRow(r).forEach(td=>tr.appendChild(td));
      tbody.appendChild(tr);
    });
  }
  t.appendChild(tbody);
  return el("div",{"style":{overflowX:"auto"}},t);
}
function td(content,style){const d=el("td",{"style":style||{}});if(typeof content==="string"||typeof content==="number")d.appendChild(txt(content));else if(content)d.appendChild(content);return d;}
function tdFlex(children){const d=el("td",{"class":"action-cell"});children.forEach(c=>d.appendChild(c));return d;}

// ── Print ──
function printDoc(doc,type){
  const db=state.db;
  const cu=db.customers.find(c=>c.id===doc.customerId);
  const ve=db.vendors.find(v=>v.id===doc.vendorId);
  const lo=db.locations.find(l=>l.id===doc.locationId)||db.locations[0];
  const pa=cu||ve;
  const tot=doc.total||0;
  const di=Number(doc.discount)||0;
  const addr=[lo?.address,lo?.city&&lo?.state?lo.city+", "+lo.state:lo?.city||lo?.state,lo?.zip].filter(Boolean).join(" ");
  const loLine="florrent, Inc. "+addr;

  const hdr=`<table style="width:100%;border-collapse:collapse;margin-bottom:6px">
    <tr><td colspan="3" style="text-align:right;font-size:10px;color:#555;padding:0 0 3px">${loLine}</td></tr>
    <tr><td colspan="3"><div style="font-size:22px;font-weight:700;color:#1B2A4A;letter-spacing:-0.5px;padding:2px 0 4px">florrent</div></td></tr>
  </table>`;

  const itemRows=(doc.items||[]).map(i=>`<tr>
    <td colspan="2" style="padding:5px 8px;border-bottom:1px solid #e5e7eb">${i.desc||i.description||""}</td>
    <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #e5e7eb">${i.qty}</td>
    <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #e5e7eb">${f$(i.up||i.unitPrice||0)}</td>
    <td style="padding:5px 8px;text-align:right;border-bottom:1px solid #e5e7eb">${f$(Number(i.qty)*Number(i.up||i.unitPrice||0))}</td>
  </tr>`).join("");

  const lineTable=`<table style="width:100%;border-collapse:collapse;margin:8px 0 4px">
    <thead><tr style="background:#1B2A4A;color:#fff">
      <th colspan="2" style="padding:6px 8px;text-align:left;font-size:11px">Description</th>
      <th style="padding:6px 8px;text-align:right;font-size:11px;width:60px">Qty</th>
      <th style="padding:6px 8px;text-align:right;font-size:11px;width:110px">Unit Price (USD)</th>
      <th style="padding:6px 8px;text-align:right;font-size:11px;width:110px">Extended (USD)</th>
    </tr></thead>
    <tbody>${itemRows}</tbody>
    <tfoot>
      <tr style="background:#f3f4f6">
        <td colspan="4" style="padding:6px 8px;text-align:right;font-weight:700;font-size:12px">${di>0?"TOTAL PRICE without Discount (USD):":"TOTAL PRICE (USD):"}</td>
        <td style="padding:6px 8px;text-align:right;font-weight:700;font-size:12px">${f$(tot)}</td>
      </tr>
      ${di>0?`<tr><td colspan="4" style="padding:4px 8px;text-align:right;font-size:11px">Discount:</td><td style="padding:4px 8px;text-align:right;font-size:11px">${(di*100).toFixed(0)}%</td></tr>
      <tr style="background:#f3f4f6"><td colspan="4" style="padding:6px 8px;text-align:right;font-weight:700;font-size:12px">TOTAL PRICE with Discount (USD):</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:12px">${f$(tot*(1-di))}</td></tr>
      <tr><td colspan="4" style="padding:4px 8px;text-align:right;font-size:11px;color:#555">Savings:</td><td style="padding:4px 8px;text-align:right;font-size:11px;color:#166534">${f$(tot*di)}</td></tr>`:""}
    </tfoot>

function renderInv(){
  const db=state.db;const wrap=el("div",{});

  acts.append(btn("Adjust Stock","btn btn-out",showAdjModal),btn("+ Warehouse","btn btn-pri",showWhModal));
  wrap.appendChild(pageHeader("Inventory & Warehouses",acts));

  // ── Shared metric builders ──
  function buildMaps(whId){
    const waitingMap={},quotedMap={},receivedMap={};
    db.purchaseOrders.filter(po=>po.status!=="received"&&(!whId||po.warehouseId===whId)).forEach(po=>{
      (po.items||[]).forEach(item=>{if(item.productId)waitingMap[item.productId]=(waitingMap[item.productId]||0)+Number(item.qty||0);});
    });
    db.quotes.filter(q=>["draft","sent","accepted"].includes(q.status)).forEach(q=>{
      (q.items||[]).forEach(item=>{if(item.productId)quotedMap[item.productId]=(quotedMap[item.productId]||0)+Number(item.qty||0);});
    });
    db.purchaseOrders.filter(po=>po.status==="received"&&(!whId||po.warehouseId===whId)).forEach(po=>{
      (po.items||[]).forEach(item=>{if(item.productId)receivedMap[item.productId]=(receivedMap[item.productId]||0)+Number(item.qty||0);});
    });
    return {waitingMap,quotedMap,receivedMap};
  }

  function invTable(getOnHand, waitingMap, quotedMap, receivedMap){
    function numTd(v,color){return td(v===0?"—":String(v),{color:v>0?(color||"#1B2A4A"):"#94a3b8",fontWeight:v>0?600:400,textAlign:"right",fontSize:"11.5px"});}
    return table(
      ["SKU","Product","On Hand","Waiting On","OH + Waiting","Quoted","PO Rcvd","Total (OH+W−PO)"],
      db.products,p=>{
        const onHand=getOnHand(p.id);
        const waiting=waitingMap[p.id]||0;
        const ohw=onHand+waiting;
        const quoted=quotedMap[p.id]||0;
        const poRcvd=receivedMap[p.id]||0;
        const total=ohw-poRcvd;
        return[
          td(el("span",{"class":"mono"},p.sku)),
          td(p.name),
          numTd(onHand,"#166534"),
          numTd(waiting,"#92400e"),
          td(String(ohw),{fontWeight:600,color:ohw>0?"#1B2A4A":"#94a3b8",textAlign:"right",fontSize:"11.5px"}),
          numTd(quoted,"#2563EB"),
          numTd(poRcvd,"#166534"),
          td(String(total),{fontWeight:700,color:total>0?"#166534":total<0?"#dc2626":"#94a3b8",textAlign:"right",fontSize:"11.5px"}),
        ];
      }
    );
  }

  function collapsibleSection(title, contentFn, actions, defaultOpen){
    const section=el("div",{"class":"card","style":{marginBottom:"10px",padding:0,overflow:"hidden"}});
    const isOpen={v:defaultOpen!==false};
    const hdr=el("div",{"style":{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",cursor:"pointer",background:"#f8fafc",borderBottom:isOpen.v?"1px solid #e2e8f0":"none"}});
    const left=el("div",{"style":{display:"flex",alignItems:"center",gap:"8px"}});
    const chevron=el("span",{"style":{fontSize:"10px",color:"#94a3b8",transition:"transform .2s",display:"inline-block",transform:isOpen.v?"rotate(90deg)":"rotate(0deg)"}},"▶");
    const titleEl=el("span",{"style":{fontSize:"13px",fontWeight:600,color:"#1B2A4A"}},title);
    left.append(chevron,titleEl);
    const right=el("div",{"style":{display:"flex",gap:"6px"},...(actions?{}:{})},  ...(actions||[]));
    hdr.append(left,right);
    const body=el("div",{"style":{padding:"12px 16px",display:isOpen.v?"block":"none"}});
    body.appendChild(contentFn());
    hdr.addEventListener("click",e=>{
      if(e.target.tagName==="BUTTON")return;
      isOpen.v=!isOpen.v;
      body.style.display=isOpen.v?"block":"none";
      chevron.style.transform=isOpen.v?"rotate(90deg)":"rotate(0deg)";
      hdr.style.borderBottom=isOpen.v?"1px solid #e2e8f0":"none";
    });
    section.append(hdr,body);
    return section;
  }

  // ── Total Inventory first ──
  if(db.warehouses.length>1){
    const allWait={},allQuoted={},allRcvd={};
    db.purchaseOrders.filter(po=>po.status!=="received").forEach(po=>{(po.items||[]).forEach(item=>{if(item.productId)allWait[item.productId]=(allWait[item.productId]||0)+Number(item.qty||0);});});
    db.quotes.filter(q=>["draft","sent","accepted"].includes(q.status)).forEach(q=>{(q.items||[]).forEach(item=>{if(item.productId)allQuoted[item.productId]=(allQuoted[item.productId]||0)+Number(item.qty||0);});});
    db.purchaseOrders.filter(po=>po.status==="received").forEach(po=>{(po.items||[]).forEach(item=>{if(item.productId)allRcvd[item.productId]=(allRcvd[item.productId]||0)+Number(item.qty||0);});});
    wrap.appendChild(collapsibleSection(
      "Total Inventory — All Warehouses",
      ()=>invTable(pid=>db.warehouses.reduce((s,wh)=>s+(db.inventory[`${wh.id}::${pid}`]||0),0), allWait, allQuoted, allRcvd),
      null, true
    ));
  }

  // ── Per-warehouse sections ──
  db.warehouses.forEach(wh=>{
    const {waitingMap,quotedMap,receivedMap}=buildMaps(wh.id);
    const actions=[
      btn("Edit","btn btn-gh",()=>showWhEditModal(wh)),
      btn("Remove","btn btn-dan",()=>confirmModal("Remove warehouse \""+wh.name+"\"?",()=>{db.warehouses=db.warehouses.filter(w=>w.id!==wh.id);log("warehouse.delete",wh.name);render();}))
    ];
    const subtitle=wh.loc?" — "+wh.loc:"";
    wrap.appendChild(collapsibleSection(
      wh.name+subtitle,
      ()=>invTable(pid=>db.inventory[`${wh.id}::${pid}`]||0, waitingMap, quotedMap, receivedMap),
      actions
    ));
  });

  if(!db.warehouses.length){
    wrap.appendChild(el("div",{"class":"card"},el("div",{"style":{color:"#94a3b8",textAlign:"center",padding:"16px"}},"No warehouses yet")));
  }

  return wrap;
}

// ── AUDIT LOG ──
function renderAud(){
  const db=state.db;const wrap=el("div",{});

  // Export: save full state as JSON embedded in an HTML file
  function exportData(){
    const snapshot=JSON.stringify(state.db,function(k,v){return v;},2);
    const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>florrent MRP Backup '+tod()+'</title></head><body>'
      +'<script id="mrp-data" type="application/json">'+snapshot+'<\/script>'
      +'<p style="font-family:sans-serif;padding:20px">florrent MRP data backup — '+new Date().toLocaleString()
      +'<br>Import this file in the MRP app via Audit Log → Import Data.</p>'
      +'</body></html>';
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="florrent-mrp-backup-"+tod()+".html";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    log("data.export","Exported snapshot");
  }

  // Import: load state from a previously exported backup HTML
  function importData(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".html";
    inp.addEventListener("change",e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const parser=new DOMParser();
          const doc2=parser.parseFromString(ev.target.result,"text/html");
          const script=doc2.getElementById("mrp-data");
          if(!script)throw new Error("No MRP data found in file.");
          const imported=JSON.parse(script.textContent);
          const keys=["products","vendors","customers","warehouses","quotes","orderAcks",
                      "invoices","purchaseOrders","workOrders","packagingSlips","locations","auditLog","inventory"];
          keys.forEach(k=>{if(imported[k]!==undefined)state.db[k]=imported[k];});
          log("data.import","Imported from "+f.name);
          render();
        } catch(err){alert("Import failed: "+err.message);}
      };
      r.readAsText(f);
    });
    inp.click();
  }

  const acts=el("div",{"style":{display:"flex",gap:"8px",flexWrap:"wrap"}});
  acts.append(
    btn("Export Data (Backup)","btn btn-out",exportData),
    btn("Import Data","btn btn-out",importData),
    btn("Clear Log","btn btn-dan",()=>confirmModal("Clear the entire audit log? This cannot be undone.",()=>{state.db.auditLog=[];log("auditlog.cleared","Audit log cleared");render();}))
  );
  wrap.appendChild(pageHeader("Audit Log",acts));

  const card=el("div",{"class":"card"});
  card.appendChild(table(["Timestamp","User","Action","Detail"],db.auditLog,r=>[
    td(new Date(r.ts).toLocaleString(),{fontSize:"10.5px",whiteSpace:"nowrap"}),
    td(r.user,{fontSize:"11.5px"}),
    td(el("span",{"class":"mono","style":{fontSize:"10.5px"}},r.action)),
    td(r.detail,{fontSize:"11.5px",color:"#475569"})
  ]));
  wrap.appendChild(card);return wrap;
}

// Password + Firebase boot

const PW_HASH = "7648691c81e4de169762f3bd860b246364e9b819e2e767ee9e1b60c2275a7319";
let appUnlocked = (sessionStorage.getItem('mrp_unlocked') === '1');
let _fbSaveTimer = null;
let _lastSaveAt  = 0;

function fbSave() {
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(function() {
    if (typeof window.__fbSave !== 'function') return;
    _lastSaveAt = Date.now();
    try {
      var clean = JSON.parse(JSON.stringify(state.db, function(k, v) {
        if (k === 'data' && typeof v === 'string' && v.startsWith('data:')) return '[local-file]';
        return v;
      }));
      window.__fbSave(clean).catch(function(e){ console.warn('fbSave error:', e); });
    } catch(e) { console.warn('fbSave error:', e); }
  }, 1200);
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

function showPasswordScreen() {
  var root = document.getElementById('root');
  root.style.cssText = 'min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A';
  root.innerHTML =
    '<div style="background:#fff;border-radius:16px;padding:34px;width:320px;font-family:system-ui,sans-serif">' +
      '<div style="font-size:26px;font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:4px">florrent</div>' +
      '<div style="font-size:10px;color:#94a3b8;letter-spacing:1.2px;margin-bottom:20px">MRP SYSTEM</div>' +
      '<div style="font-size:17px;font-weight:600;color:#1B2A4A;margin-bottom:6px">Enter password</div>' +
      '<div style="font-size:12px;color:#64748b;margin-bottom:14px">This system is password protected.</div>' +
      '<input id="pw" type="password" placeholder="Password" ' +
        'style="width:100%;margin-bottom:10px;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;' +
        'font-size:13px;font-family:inherit;outline:none;box-sizing:border-box"/>' +
      '<div id="pw-err" style="font-size:12px;color:#dc2626;margin-bottom:8px;display:none">Incorrect password.</div>' +
      '<button id="pw-btn" style="width:100%;padding:10px;background:#2563EB;color:#fff;border:none;' +
        'border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Unlock</button>' +
    '</div>';
  var pwEl  = document.getElementById('pw');
  var errEl = document.getElementById('pw-err');
  var btnEl = document.getElementById('pw-btn');
  async function tryUnlock() {
    btnEl.disabled = true; btnEl.textContent = 'Checking…';
    var h = await sha256(pwEl.value);
    if (h === PW_HASH) {
      sessionStorage.setItem('mrp_unlocked', '1');
      appUnlocked = true;
      root.style.cssText = '';
      bootApp();
    } else {
      errEl.style.display = 'block'; pwEl.value = '';
      btnEl.disabled = false; btnEl.textContent = 'Unlock'; pwEl.focus();
    }
  }
  btnEl.addEventListener('click', tryUnlock);
  pwEl.addEventListener('keydown', function(e){ if(e.key === 'Enter') tryUnlock(); });
  setTimeout(function(){ pwEl.focus(); }, 50);
}

async function bootApp() {
  var root = document.getElementById('root');
  root.style.cssText = '';
  root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
    'background:#f0f4f8;font-family:system-ui,sans-serif;color:#64748b;font-size:14px">Loading…</div>';
  if (typeof window.__fbLoad === 'function') {
    try {
      var remote = await window.__fbLoad();
      if (remote) {
        var keys = ['products','vendors','customers','warehouses','quotes','orderAcks',
                    'invoices','purchaseOrders','workOrders','packagingSlips','locations','auditLog'];
        keys.forEach(function(k){ if(Array.isArray(remote[k])) state.db[k] = remote[k]; });
        if (remote.inventory && typeof remote.inventory === 'object') state.db.inventory = remote.inventory;
      }
    } catch(e) { console.warn('Firebase load error:', e); }
    if (typeof window.__fbListen === 'function') {
      window.__fbListen(function(remoteDb) {
        if (Date.now() - _lastSaveAt < 3000) return;
        var keys = ['products','vendors','customers','warehouses','quotes','orderAcks',
                    'invoices','purchaseOrders','workOrders','packagingSlips','locations','auditLog'];
        keys.forEach(function(k){ if(Array.isArray(remoteDb[k])) state.db[k] = remoteDb[k]; });
        if (remoteDb.inventory && typeof remoteDb.inventory === 'object') state.db.inventory = remoteDb.inventory;
        render();
      });
    }
  }
  render();
}

// Patch render() and log() to add password check and firebase save
var _coreRender = render;
render = function() {
  if (!appUnlocked) { showPasswordScreen(); return; }
  _coreRender();
  fbSave();
};

var _coreLog = log;
log = function(action, detail) {
  _coreLog(action, detail);
  fbSave();
};

// Start
if (!appUnlocked) {
  showPasswordScreen();
} else {
  var _booted = false;
  function _tryBoot() { if (!_booted) { _booted = true; bootApp(); } }
  window.addEventListener('fb-ready', _tryBoot);
  setTimeout(_tryBoot, 2000);
}
