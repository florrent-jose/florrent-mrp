<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>florrent MRP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#f0f4f8;color:#1e293b}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:205px;background:#1B2A4A;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sidebar-sub{font-size:9px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.8px}
.sidebar-nav{flex:1;padding:6px 0}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 14px;background:transparent;border:none;border-left:3px solid transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:12.5px;text-align:left;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(255,255,255,.13);color:#fff;border-left-color:#2563EB}
.sidebar-user{padding:10px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user-name{font-size:12.5px;color:#fff;font-weight:500}
.sidebar-user-label{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:2px}
.signout-btn{margin-top:5px;font-size:11px;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
.main{flex:1;overflow-y:auto;padding:22px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.page-title{font-size:18px;font-weight:600;color:#1B2A4A}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#1B2A4A;margin-bottom:9px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit;line-height:1.4}
.btn-pri{background:#2563EB;color:#fff;border-color:#2563EB}
.btn-pri:hover{background:#1d4ed8}
.btn-out{background:#fff;color:#1B2A4A;border-color:#cbd5e1}
.btn-out:hover{background:#f8fafc}
.btn-dan{background:#fff;color:#dc2626;border-color:#fca5a5}
.btn-gh{background:transparent;color:#64748b;border:none;padding:3px 7px}
.btn-gh:hover{color:#1B2A4A}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block}
.badge-bl{background:#dbeafe;color:#1d4ed8}
.badge-gr{background:#f1f5f9;color:#475569}
.badge-gn{background:#dcfce7;color:#166534}
.badge-am{background:#fef3c7;color:#92400e}
.badge-rd{background:#fee2e2;color:#991b1b}
.badge-pu{background:#ede9fe;color:#5b21b6}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 10px;text-align:left;font-weight:600;color:#475569;font-size:11px;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f9fafb;vertical-align:middle}
tr:hover td{background:#f8fafc}
.form-label{font-size:11px;color:#64748b;font-weight:500;display:block;margin-bottom:3px;margin-top:9px}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{width:100%;padding:6px 9px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;color:#1e293b;outline:none}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:#2563EB}
textarea{resize:vertical}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:660px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{width:820px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid #e2e8f0}
.modal-title{font-size:14px;font-weight:600;color:#1B2A4A}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:#94a3b8;line-height:1;font-family:inherit}
.modal-body{padding:18px}
.section-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #f1f5f9}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#f8fafc;border-radius:8px;padding:11px 14px;flex:1;min-width:120px}
.stat-lbl{font-size:11px;color:#64748b;font-weight:500;margin-bottom:2px}
.stat-val{font-size:21px;font-weight:600}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:12px}
.mono{font-family:monospace;font-weight:500;color:#2563EB}
.upload-zone{border:1.5px dashed #cbd5e1;border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;background:#fafbfc;margin-bottom:6px}
.upload-zone:hover{border-color:#2563EB;background:#eff6ff}
.file-item{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:4px 8px;background:#f1f5f9;border-radius:5px;margin-bottom:3px}
.action-cell{display:flex;gap:3px;flex-wrap:wrap}
.empty-row td{text-align:center;color:#94a3b8;padding:20px!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A}
.login-box{background:#fff;border-radius:16px;padding:34px;width:310px}
.login-logo{font-size:26px;font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:4px}
.login-sub{font-size:10px;color:#94a3b8;letter-spacing:1.2px;margin-bottom:20px}
.login-h{font-size:17px;font-weight:600;color:#1B2A4A;margin-bottom:4px}
.login-p{font-size:12px;color:#64748b;margin-bottom:16px}
.doc-view-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #1B2A4A}
.doc-logo{font-size:22px;font-weight:700;color:#1B2A4A;letter-spacing:-0.5px;line-height:1}
.doc-tagline{font-size:8.5px;color:#94a3b8;letter-spacing:1px;margin-top:2px}
.doc-addr{text-align:right;font-size:11px;color:#64748b}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px}
.meta-cell{background:#f8fafc;padding:5px 8px;border-radius:5px}
.meta-cell-lbl{font-size:8.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.meta-cell-val{font-weight:500;font-size:12px}
.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.party-cell{background:#f8fafc;padding:9px 10px;border-radius:6px}
.doc-table th{background:#1B2A4A;color:#fff}
.sig-row{margin-top:14px;padding:11px;border:1px solid #e2e8f0;border-radius:6px;display:flex;justify-content:space-between}
.sig-line{margin-top:20px;border-top:1px solid #94a3b8;width:170px;padding-top:3px;font-size:9px;color:#94a3b8}
.contacts-panel{margin-top:13px;padding-top:9px;border-top:1px solid #e2e8f0}
.contacts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.contacts-lbl{font-size:12px;font-weight:600;color:#1B2A4A}
.add-contact-form{margin-top:8px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.line-items-table{width:100%;border-collapse:collapse;margin-bottom:7px}
.line-items-total{text-align:right;font-weight:700;color:#1B2A4A;padding:6px 10px}
input[type=checkbox]{width:auto;margin-right:4px}
.detail-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.detail-cell{background:#f8fafc;padding:6px 9px;border-radius:5px}
.detail-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.detail-val{font-weight:500;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Constants ──
const B="#1B2A4A",A="#2563EB";
const PRODS=[
  {id:"p1",sku:"floMOD16V500",name:"floMOD 16V 500F",lp:5000},
  {id:"p2",sku:"floMOD32V250",name:"floMOD 32V 250F",lp:10000},
  {id:"p3",sku:"floMOD48V166",name:"floMOD 48V 166F",lp:15000},
  {id:"p4",sku:"floMOD64V125",name:"floMOD 64V 125F",lp:20000},
  {id:"p5",sku:"floMOD80V100",name:"floMOD 80V 100F",lp:25000},
  {id:"p6",sku:"floMOD96V83", name:"floMOD 96V 83F", lp:30000},
];
const USERS=[{id:"u1",name:"Jose"},{id:"u2",name:"Joe"},{id:"u3",name:"Kaitlin"}];
const NAV=[
  {id:"dash",ico:"📊",lbl:"Dashboard"},
  {id:"prods",ico:"📦",lbl:"Products"},
  {id:"inv",ico:"🏭",lbl:"Inventory"},
  {id:"vend",ico:"🚚",lbl:"Vendors"},
  {id:"cust",ico:"👥",lbl:"Customers"},
  {id:"quot",ico:"📋",lbl:"Quotes"},
  {id:"oa",ico:"✅",lbl:"Order Acks"},
  {id:"inv2",ico:"🧾",lbl:"Invoices"},
  {id:"po",ico:"🛒",lbl:"Purchase Orders"},
  {id:"wo",ico:"🔧",lbl:"Work Orders"},
  {id:"loc",ico:"🏢",lbl:"Locations"},
  {id:"aud",ico:"📜",lbl:"Audit Log"},
];

// ── Helpers ──
function uid(){return Math.random().toString(36).slice(2,9);}
function tod(){return new Date().toISOString().slice(0,10);}
function f$(n){return "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0});}
function gn(p,l){return `FLR-${p}-${tod().replace(/-/g,"")}-${String(l.length+1).padStart(3,"0")}`;}
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class"){e.className=v;}
    else if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="html"){e.innerHTML=v;}
    else{e.setAttribute(k,v);}
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}
function txt(s){return document.createTextNode(String(s));}
function frag(...children){const f=document.createDocumentFragment();children.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)f.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});return f;}

// ── State ──
let state={
  user:null,page:"dash",
  db:{
    products:[...PRODS],
    vendors:[],customers:[],
    warehouses:[{id:"wh1",name:"Northampton Main",loc:"155 Industrial Drive, Northampton MA 01060"}],
    inventory:{},quotes:[],orderAcks:[],invoices:[],
    purchaseOrders:[],workOrders:[],packagingSlips:[],
    locations:[{id:"loc1",name:"Northampton HQ",address:"155 Industrial Drive, Ste. 2",city:"Northampton",state:"MA",zip:"01060",country:"USA",isDefault:true}],
    auditLog:[],
  }
};

function log(action,detail){
  state.db.auditLog.unshift({id:uid(),ts:new Date().toISOString(),user:state.user?.name||"System",action,detail});
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  if(!state.user){root.appendChild(renderLogin());return;}
  root.appendChild(renderApp());
}

// ── Primitives ──
function btn(label,cls,onClick,disabled){
  const b=el("button",{"class":"btn "+cls,onClick,disabled:disabled||false},label);
  return b;
}
function badge(text,color){return el("span",{"class":"badge badge-"+color},text);}
function modal(title,w,contentFn,onClose){
  const ov=el("div",{"class":"overlay"});
  const m=el("div",{"class":"modal"+(w==="lg"?" modal-lg":"")});
  const hdr=el("div",{"class":"modal-header"},
    el("span",{"class":"modal-title"},title),
    el("button",{"class":"modal-close",onClick:()=>ov.remove()},"×")
  );
  const body=el("div",{"class":"modal-body"});
  body.appendChild(contentFn(()=>ov.remove()));
  m.append(hdr,body);
  ov.appendChild(m);
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  return ov;
}
function formLabel(text){return el("label",{"class":"form-label"},text);}
function inp(type,value,onChange,placeholder){
  const i=el("input",{type,value:value||"",placeholder:placeholder||""});
  i.addEventListener("input",e=>onChange(e.target.value));
  return i;
}
function sel(opts,value,onChange){
  const s=el("select",{});
  opts.forEach(o=>{const op=el("option",{value:o.v},o.l);if(o.v===value)op.selected=true;s.appendChild(op);});
  s.addEventListener("change",e=>onChange(e.target.value));
  return s;
}
function ta(value,onChange,rows){
  const t=el("textarea",{rows:rows||2},value||"");
  t.addEventListener("input",e=>onChange(e.target.value));
  return t;
}
function fg(label,control){return frag(formLabel(label),control);}
function secLbl(text){return el("div",{"class":"section-lbl"},text);}
function detailCell(k,v){return el("div",{"class":"detail-cell"},el("div",{"class":"detail-lbl"},k),el("div",{"class":"detail-val"},v||"—"));}

// ── File Upload ──
function fileUpload(files,onAdd,accept){
  const wrap=el("div",{});
  const zone=el("div",{"class":"upload-zone"});
  const inp_=document.createElement("input");
  inp_.type="file";inp_.accept=accept||"*";inp_.style.display="none";
  inp_.addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{onAdd({id:uid(),name:f.name,size:f.size,data:ev.target.result,at:tod()});inp_.value="";renderFileList();};
    r.readAsDataURL(f);
  });
  zone.append(el("span",{},"📎"),el("span",{"style":{fontSize:"12px",color:"#64748b"}},"Click to attach file"),inp_);
  zone.addEventListener("click",()=>inp_.click());
  wrap.appendChild(zone);
  const list=el("div",{});
  function renderFileList(){
    list.innerHTML="";
    files.forEach(f=>{
      const row=el("div",{"class":"file-item"},
        el("span",{},"📄"),
        el("span",{"style":{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},f.name),
        el("span",{"style":{color:"#94a3b8",fontSize:"10px"}},(f.size/1024).toFixed(0)+"KB · "+f.at)
      );
      if(f.data){const a=el("a",{href:f.data,download:f.name,"style":{color:A,fontSize:"11px",textDecoration:"none",fontWeight:600}},"↓");row.appendChild(a);}
      list.appendChild(row);
    });
  }
  renderFileList();
  wrap.appendChild(list);
  return wrap;
}

// ── Table ──
function table(cols,rows,renderRow){
  const t=el("table",{});
  const thead=el("thead",{});const hrow=el("tr",{});
  cols.forEach(c=>hrow.appendChild(el("th",{},c)));
  thead.appendChild(hrow);t.appendChild(thead);
  const tbody=el("tbody",{});
  if(rows.length===0){
    const tr=el("tr",{"class":"empty-row"});
    tr.appendChild(el("td",{colspan:cols.length},"No records yet"));
    tbody.appendChild(tr);
  } else {
    rows.forEach(r=>{
      const tr=el("tr",{});
      renderRow(r).forEach(td=>tr.appendChild(td));
      tbody.appendChild(tr);
    });
  }
  t.appendChild(tbody);
  return el("div",{"style":{overflowX:"auto"}},t);
}
function td(content,style){const d=el("td",{"style":style||{}});if(typeof content==="string"||typeof content==="number")d.appendChild(txt(content));else if(content)d.appendChild(content);return d;}
function tdFlex(children){const d=el("td",{"class":"action-cell"});children.forEach(c=>d.appendChild(c));return d;}

// ── Print ──
function printDoc(doc,type){
  const db=state.db;
  const cu=db.customers.find(c=>c.id===doc.customerId);
  const ve=db.vendors.find(v=>v.id===doc.vendorId);
  const lo=db.locations.find(l=>l.id===doc.locationId)||db.locations[0];
  const pa=cu||ve;const tot=doc.total||0;const di=Number(doc.discount)||0;
  const rows=(doc.items||[]).map(i=>`<tr><td>${i.desc||i.description||""}</td><td style="text-align:right">${i.qty}</td><td style="text-align:right">${f$(i.up||i.unitPrice||0)}</td><td style="text-align:right">${f$(Number(i.qty)*Number(i.up||i.unitPrice||0))}</td></tr>`).join("");
  const meta=[["Doc #",doc.number],["Date",doc.date],doc.leadTime?["Lead Time",doc.leadTime]:null,doc.validThrough?["Valid Through",doc.validThrough]:null,doc.quoteNumber?["Ref Quote",doc.quoteNumber]:null,doc.oaNumber?["Ref OA",doc.oaNumber]:null,doc.terms?["Terms",doc.terms]:null].filter(Boolean);
  const html=`<div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #1B2A4A"><div><div style="font-size:24px;font-weight:700;color:#1B2A4A">florrent</div><div style="font-size:9px;color:#999;letter-spacing:1px">MATERIALS · POWER · INNOVATION</div></div><div style="text-align:right;font-size:10px;color:#666"><strong>${lo?.name||"florrent, Inc."}</strong><br/>${lo?.address||""}<br/>${[lo?.city,lo?.state,lo?.zip].filter(Boolean).join(", ")}</div></div>
  <h1 style="font-size:18px;color:#1B2A4A;margin:0 0 4px">${type}</h1>${type==="ORDER ACKNOWLEDGEMENT"?'<div style="font-size:10px;color:#999;margin-bottom:8px">(NOT AN INVOICE)</div>':""}
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px">${meta.map(([k,v])=>`<div style="background:#f8f8f8;padding:6px 8px"><div style="font-size:9px;color:#999;text-transform:uppercase">${k}</div><div style="font-size:12px;font-weight:600">${v}</div></div>`).join("")}</div>
  ${pa?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px"><div style="background:#f8f8f8;padding:8px"><div style="font-size:9px;color:#999;text-transform:uppercase;margin-bottom:3px">${cu?"ATTENTION":ve?"VENDOR":""}</div><strong>${pa.companyName}</strong><br/>${(pa.contactFirst||"")+" "+(pa.contactLast||"")}<br/>${pa.billAddr1||pa.hqLocation||""}<br/><span style="color:#2563EB">${pa.contactEmail||""}</span></div>${cu?`<div style="background:#f8f8f8;padding:8px"><div style="font-size:9px;color:#999;text-transform:uppercase;margin-bottom:3px">SHIP TO</div><strong>${cu.companyName}</strong><br/>${cu.shipAddr1||cu.billAddr1||""}</div>`:""}</div>`:""}
  <table style="width:100%;border-collapse:collapse;margin:10px 0"><thead><tr><th style="background:#1B2A4A;color:#fff;padding:6px 10px;text-align:left;font-size:11px">Description</th><th style="background:#1B2A4A;color:#fff;padding:6px 10px;text-align:right;font-size:11px">Qty</th><th style="background:#1B2A4A;color:#fff;padding:6px 10px;text-align:right;font-size:11px">Unit Price (USD)</th><th style="background:#1B2A4A;color:#fff;padding:6px 10px;text-align:right;font-size:11px">Extended (USD)</th></tr></thead><tbody>${rows}</tbody><tfoot><tr style="background:#f0f0f0"><td colspan="3" style="padding:6px 10px;text-align:right;font-weight:700">TOTAL (USD)</td><td style="padding:6px 10px;text-align:right;font-weight:700">${f$(tot)}</td></tr>${di>0?`<tr><td colspan="3" style="padding:4px 10px;text-align:right">Discount (${(di*100).toFixed(0)}%)</td><td style="padding:4px 10px;text-align:right;color:#dc2626">-${f$(tot*di)}</td></tr><tr style="background:#f0f0f0"><td colspan="3" style="padding:6px 10px;text-align:right;font-weight:700">TOTAL WITH DISCOUNT</td><td style="padding:6px 10px;text-align:right;font-weight:700;color:#2563EB">${f$(tot*(1-di))}</td></tr>`:""}</tfoot></table>

<script type="module">
// ══════════════════════════════════════════
// FIREBASE — replace placeholder values with
// your real config from Firebase Console
// ══════════════════════════════════════════
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "REPLACE_WITH_YOUR_API_KEY",
  authDomain:        "REPLACE_WITH_YOUR_AUTH_DOMAIN",
  projectId:         "REPLACE_WITH_YOUR_PROJECT_ID",
  storageBucket:     "REPLACE_WITH_YOUR_STORAGE_BUCKET",
  messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
  appId:             "REPLACE_WITH_YOUR_APP_ID"
};

try {
  const fbApp = initializeApp(firebaseConfig);
  const fdb   = getFirestore(fbApp);
  const MRP   = doc(fdb, "mrp", "shared");

  window.__fbLoad = async function() {
    const snap = await getDoc(MRP);
    if (snap.exists()) return JSON.parse(snap.data().payload);
    return null;
  };

  window.__fbSave = async function(dbState) {
    try {
      await setDoc(MRP, {
        payload: JSON.stringify(dbState),
        updatedAt: new Date().toISOString()
      });
    } catch(e) { console.warn("Firestore save error:", e); }
  };

  window.__fbListen = function(cb) {
    return onSnapshot(MRP, snap => {
      if (snap.exists()) {
        try { cb(JSON.parse(snap.data().payload)); } catch(e) {}
      }
    });
  };
} catch(e) {
  console.warn("Firebase init failed (config not set yet):", e.message);
}

// Signal main script
window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
// ══════════════════════════════════════════
// PASSWORD GATE + BOOT
// ══════════════════════════════════════════
const PW_HASH = "7648691c81e4de169762f3bd860b246364e9b819e2e767ee9e1b60c2275a7319";
let appUnlocked = (sessionStorage.getItem('mrp_unlocked') === '1');
let _lastSave   = 0;
let _saveTimer  = null;

// ── SHA-256 (Web Crypto) ──
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Debounced Firestore save (strips binary blobs) ──
function saveToFirebase() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    if (!window.__fbSave) return;
    _lastSave = Date.now();
    const clean = JSON.parse(JSON.stringify(state.db, function(k, v) {
      if (k === 'data' && typeof v === 'string' && v.startsWith('data:')) return '[local-file]';
      return v;
    }));
    window.__fbSave(clean);
  }, 1200);
}

// ── Password screen ──
function showPasswordScreen() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  root.style.cssText = 'min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1B2A4A';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:16px;padding:34px;width:320px;font-family:system-ui,sans-serif';
  box.innerHTML =
    '<div style="font-size:26px;font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:4px">florrent</div>' +
    '<div style="font-size:10px;color:#94a3b8;letter-spacing:1.2px;margin-bottom:20px">MRP SYSTEM</div>' +
    '<div style="font-size:17px;font-weight:600;color:#1B2A4A;margin-bottom:4px">Enter password</div>' +
    '<div style="font-size:12px;color:#64748b;margin-bottom:16px">This system is password protected.</div>' +
    '<input id="pw" type="password" placeholder="Password" ' +
      'style="width:100%;margin-bottom:10px;padding:9px 11px;border:1px solid #cbd5e1;' +
      'border-radius:8px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box"/>' +
    '<div id="pw-err" style="font-size:12px;color:#dc2626;margin-bottom:8px;display:none">Incorrect password.</div>' +
    '<button id="pw-btn" style="width:100%;padding:10px;background:#2563EB;color:#fff;border:none;' +
      'border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Unlock</button>';

  root.appendChild(box);

  const pwEl  = document.getElementById('pw');
  const errEl = document.getElementById('pw-err');
  const btnEl = document.getElementById('pw-btn');

  async function tryUnlock() {
    const h = await sha256(pwEl.value);
    if (h === PW_HASH) {
      sessionStorage.setItem('mrp_unlocked', '1');
      appUnlocked = true;
      root.style.cssText = '';
      bootApp();
    } else {
      errEl.style.display = 'block';
      pwEl.value = '';
      pwEl.focus();
    }
  }

  btnEl.addEventListener('click', tryUnlock);
  pwEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryUnlock(); });
  setTimeout(function() { pwEl.focus(); }, 50);
}

// ── Load remote data and start the app ──
async function bootApp() {
  // Show spinner
  const root = document.getElementById('root');
  root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
    'background:#f0f4f8;font-family:system-ui,sans-serif;color:#64748b;font-size:14px">Loading…</div>';

  // Pull from Firebase if available
  if (window.__fbLoad) {
    try {
      const remote = await window.__fbLoad();
      if (remote) {
        var keys = ['products','vendors','customers','warehouses','quotes','orderAcks',
                    'invoices','purchaseOrders','workOrders','packagingSlips','locations','auditLog'];
        keys.forEach(function(k) { if (Array.isArray(remote[k])) state.db[k] = remote[k]; });
        if (remote.inventory && typeof remote.inventory === 'object') state.db.inventory = remote.inventory;
      }
    } catch(e) { console.warn('Firebase load error:', e); }

    // Live updates from other users
    if (window.__fbListen) {
      window.__fbListen(function(remoteDb) {
        if (Date.now() - _lastSave < 3000) return;
        var keys = ['products','vendors','customers','warehouses','quotes','orderAcks',
                    'invoices','purchaseOrders','workOrders','packagingSlips','locations','auditLog'];
        keys.forEach(function(k) { if (Array.isArray(remoteDb[k])) state.db[k] = remoteDb[k]; });
        if (remoteDb.inventory && typeof remoteDb.inventory === 'object') state.db.inventory = remoteDb.inventory;
        render();
      });
    }
  }

  render();
}

// ── Patch render() and log() after they are defined ──
// We use a DOMContentLoaded-style trick: by the time this <script> runs,
// the previous <script> block has already defined render and log as plain functions.
// We capture and replace them on the window object isn't needed — we just call
// them by name. Instead, we shadow them here:

var _coreRender = render;   // capture original
var _coreLog    = log;      // capture original

// Override render globally
render = function() {
  if (!appUnlocked) { showPasswordScreen(); return; }
  _coreRender();
  saveToFirebase();
};

// Override log globally
log = function(action, detail) {
  _coreLog(action, detail);
  saveToFirebase();
};

// ── Start ──
if (!appUnlocked) {
  showPasswordScreen();
} else {
  // If Firebase module already fired, boot immediately; otherwise wait briefly
  var _booted = false;
  function _tryBoot() {
    if (_booted) return;
    _booted = true;
    bootApp();
  }
  window.addEventListener('fb-ready', _tryBoot);
  // Boot anyway after 2s even if Firebase module hasn't loaded
  setTimeout(_tryBoot, 2000);
}
</script>
